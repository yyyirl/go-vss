Mode: "${SKEYEVSS_SERVER_ENV_MODE}"
ContainerizedState: ${SKEYEVSS_CONTAINERIZED_STATE}
Name: "${SKEYEVSS_BACKEND_API}"
ProductName: "${SKEYEVSS_PRODUCT_NAME}"
Version: "${SKEYEVSS_VERSION}"
ActivateCodePath: "${SKEYEVSS_ACTIVATE_CODE_PATH}"
Port: ${SKEYEVSS_BACKEND_API_PORT}
Host: "${SKEYEVSS_SEV_BIND_IP}"
Timeout: 30000
# 1G
MaxBytes: 1073741824
# 日志路径
LogPath: "${SKEYEVSS_SERVER_LOG_PATH}"
# 初始更新管理后台密码
InitializeSetPassword: ${SKEYEVSS_ENABLED_UPDATE_BACKEND_MANAGE_PWD}
# 内网ip
InternalIP: "${SKEYEVSS_INTERNAL_IP}"
# 外网ip
ExternalIP: "${SKEYEVSS_EXTERNAL_IP}"
VssHttpTarget: "${SKEYEVSS_INTERNAL_IP}:${SKEYEVSS_VSS_HTTP_PORT}"
VssSseTarget: "${SKEYEVSS_INTERNAL_IP}:${SKEYEVSS_VSS_SSE_PORT}"
VssSseTargetFrontend: "${SKEYEVSS_VSS_SSE_TARGET_FRONTEND}"
VssHttpTargetFrontend: "${SKEYEVSS_VSS_HTTP_TARGET_FRONTEND}"
WebProxyFileTargetFrontend: "${SKEYEVSS_WEB_SEV_PROXY_FILE_URL_FRONTEND}"
# 文件保存路径
SaveFileDir: "${SKEYEVSS_SAVE_FILE_DIR}"
# 设备录像保存目录
SaveVideoDir: "${SKEYEVSS_SAVE_VIDEO_DIR}"
PProfPort: ${SKEYEVSS_PPROF_BACKEND_API_PORT}
PProfFileDir: "${SKEYEVSS_SAVE_PPROF_DIR}"
UseSipPrintLog: ${SKEYEVSS_PRINT_REQUEST_LOG}
SipLogPath: "${SKEYEVSS_SERVER_LOG_PATH}/${SKEYEVSS_VSS_NAME}/sip"
OSEnvironment: "${SKEYEVSS_OS_ENVIRONMENT}"
SevVolumesDir: "${SKEYEVSS_SEV_VOLUMES_DIR}"
MinioApiTarget: "${SKEYEVSS_MINIO_API_TARGET}"
WebsocketPort: ${SKEYEVSS_VSS_WS_PORT}
WebsocketHost: "${SKEYEVSS_INTERNAL_IP}"
TMapKey: "${SKEYEVSS_TMAP_KEY}"
Domain: "${SKEYEVSS_DOMAIN}"
WSProxy: "${SKEYEVSS_WS_PROX}"
UseShowcaseAccount: ${SKEYEVSS_BACKEND_USE_SHOWCASE}

PProf:
    BackendApiPort: ${SKEYEVSS_PPROF_BACKEND_API_PORT}
    BackendApiName: "BACKEND-API"
    DbRpcPort: ${SKEYEVSS_PPROF_DB_RPC_PORT}
    DbRpcName: "DB-RPC"
    VssPort: ${SKEYEVSS_PPROF_VSS_PORT}
    VssName: "VSS"
    WebPort: ${SKEYEVSS_PPROF_WEB_PORT}
    WebName: "WEB-PROXY"
    CronPort: ${SKEYEVSS_PPROF_CRON_PORT}
    CronName: "CRON"
    MediaServerPort: ${SKEYEVSS_MEDIA_SERVER_PORT}
    MediaServerName: "MEDIA-SERVER"

RpcInterceptor:
    UseRpcCallerRetry: ${SKEYEVSS_USE_RPC_CALLER_RETRY}
    RpcCallerRetryMax: ${SKEYEVSS_RPC_CALLER_RETRY_MAX}
    RpcCallerRetryWaitInterval: ${SKEYEVSS_RPC_CALLER_RETRY_WAIT_INTERVAL}

    UseRpcKeepalive: ${SKEYEVSS_USE_RPC_KEEPALIVE}
    RpcKeepaliveTime: ${SKEYEVSS_RPC_KEEPALIVE_TIME}
    RpcKeepaliveTimeout: ${SKEYEVSS_RPC_KEEPALIVE_TIMEOUT}
    RpcKeepalivePermitWithoutStream: ${SKEYEVSS_RPC_KEEPALIVE_PERMIT_WITHOUT_STREAM}

Auth:
    AesKey: "${SKEYEVSS_AES_KEY}"
    JwtSecret: "${SKEYEVSS_U_KEY_BACKEND_API}"
    TokenType: 0
    LoginExpire: 172800000
    ConnType: "backend-api"
    LoginRememberExpire: 604800000

SavePath:
    Log: ""
    Image: "${SKEYEVSS_ROOT}/tmp/images/"
    File: "${SKEYEVSS_ROOT}/tmp/files/"
    Pdf: "${SKEYEVSS_ROOT}/tmp/pdfs/"

RedisHost: "${SKEYEVSS_REDIS_HOST}:${SKEYEVSS_REDIS_PORT}"

Sip:
    UseExternalIP: ${SKEYEVSS_VSS_USE_EXTERNAL_IP}
    CascadeSipPort: ${SKEYEVSS_VSS_CASCADE_SIP_PORT}
    # 服务监听的 tcp/udp 端口号
    Port: ${SKEYEVSS_VSS_PORT}
    # gb/t28181 20 位国标 ID
    ID: '${SKEYEVSS_VSS_SIP_ID}'
    # 域
    Domain: '${SKEYEVSS_VSS_SIP_DOMAIN}'
    # 注册密码
    Password: '${SKEYEVSS_VSS_SIP_PASSWORD}'
    # 是否使用密码校验
    UsePassword: ${SKEYEVSS_VSS_SIP_USE_PASSWORD}
    # 定时发送catalog请求
    CatalogInterval: ${SKEYEVSS_VSS_SIP_CATALOG_INTERVAL}
    # 设备在线心跳存活时间
    HeartbeatTimeout: ${SKEYEVSS_VSS_SIP_LIFETIME_TIMEOUT_INTERVAL}
    # 是否开启公网收流
    UseExternalWan: ${SKEYEVSS_VSS_SIP_USE_EXTERNAL_WAN}
    Expire: 3600
    SendTimeout: ${SKEYEVSS_VSS_SIP_SEND_TIMEOUT_INTERVAL}
    MediaReceiveStreamTimeout: ${SKEYEVSS_VSS_MEDIA_RECEIVE_TIMEOUT_INTERVAL}
    MediaNoWatchingTimeout: ${SKEYEVSS_VSS_MEDIA_NO_WATCHING_TIMEOUT_INTERVAL}
    MediaServerStreamPortMax: ${SKEYEVSS_VSS_MEDIA_SERVER_STREAM_PORT_MAX}
    MediaServerStreamPortMin: ${SKEYEVSS_VSS_MEDIA_SERVER_STREAM_PORT_MIN}
    MediaServerVssSameMachine: ${SKEYEVSS_VSS_SIP_MEDIA_SERVER_VSS_SAME_MACHINE}
    UsableMinPort: ${SKEYEVSS_VSS_INVITE_USABLE_MIN_PORT}
    UsableMaxPort: ${SKEYEVSS_VSS_INVITE_USABLE_MAX_PORT}

Log:
    KeepDays: 30
    Compress: true
    ServiceName: "${SKEYEVSS_BACKEND_API_NAME}"
    Path: "${SKEYEVSS_SERVER_LOG_PATH}/${SKEYEVSS_BACKEND_API_NAME}"
    Mode: "${SKEYEVSS_LOG_MODE}"
    Encoding: "${SKEYEVSS_LOG_ENCODING}"
    Level: "${SKEYEVSS_LOG_LEVEL}"

Email:
    Emails: "${SKEYEVSS_EMAILS}"
    Host: "${SKEYEVSS_EMAIL_HOST}"
    Port: "${SKEYEVSS_EMAIL_PORT}"
    Username: "${SKEYEVSS_EMAIL_USERNAME}"
    Password: "${SKEYEVSS_EMAIL_PASSWORD}"

DevServer:
    Enabled: false
    Port: ${SKEYEVSS_BACKEND_API_PORT}
    HealthPath: "${SKEYEVSS_DEV_SERVER_HEALTH_PATH}"

#DBGrpc:
#    Timeout: 20000
#    Endpoints:
#        - 0.0.0.0:${SKEYEVSS_DB_GRPC_PORT}
DBGrpc:
    Timeout: 20000
    Etcd:
        Key: "${SKEYEVSS_DB_GRPC_NAME}"
        Hosts:
            - "${SKEYEVSS_ETCD_HOST}:${SKEYEVSS_ETCD_CLIENT_PORT}"

Telemetry:
    Name: "${SKEYEVSS_BACKEND_API_NAME}"
    Endpoint: "${SKEYEVSS_TELEMETRY_ENDPOINT}"
    Sampler: ${SKEYEVSS_TELEMETRY_SAMPLER}
    Batcher: "${SKEYEVSS_TELEMETRY_BATCHER}"
    Disabled: ${SKEYEVSS_ENABLED_TELEMETRY_DISABLED}

# service base config
SevBase:
    UseMysql: ${SKEYEVSS_ENABLED_MYSQL}
    UseRedis: ${SKEYEVSS_ENABLED_REDIS}
    UseFfmpeg: ${SKEYEVSS_ENABLED_FFMPEG}
    UseEtcd: ${SKEYEVSS_ENABLED_ETCD}
    # mysql sqlite
    DatabaseType: "${SKEYEVSS_DATABASE_TYPE}"

    Root: "${SKEYEVSS_ROOT}"
    MysqlUsername: "${SKEYEVSS_MYSQL_USERNAME}"
    MysqlPassword: "${SKEYEVSS_MYSQL_PASSWORD}"
    RedisPassword: "${SKEYEVSS_REDIS_PASSWORD}"

    SevNameMysql: "${SKEYEVSS_MYSQL_NAME}"
    SevNameRedis: "${SKEYEVSS_REDIS_NAME}"
    SevNameEtcd: "${SKEYEVSS_ETCD_NAME}"
    SevNameMediaServer: "${SKEYEVSS_MEDIA_SERVER_NAME}"
    SevNameGuard: "${SKEYEVSS_GUARD_NAME}"
    SevNameVss: "${SKEYEVSS_VSS_NAME}"
    SevNameCron: "${SKEYEVSS_CRON_NAME}"
    SevNameDB: "${SKEYEVSS_DB_GRPC_NAME}"
    SevNameBackendApi: "${SKEYEVSS_BACKEND_API_NAME}"
    SevNameWebSev: "${SKEYEVSS_WEB_SEV_NAME}"

    MysqlPort: ${SKEYEVSS_MYSQL_PORT}
    MysqlHost: ${SKEYEVSS_MYSQL_HOST}
    RedisPort: ${SKEYEVSS_REDIS_PORT}
    RedisHost: ${SKEYEVSS_REDIS_HOST}
    EtcdPort: ${SKEYEVSS_ETCD_CLIENT_PORT}
    WebSevPort: ${SKEYEVSS_WEB_SEV_PORT}
    MediaServerPort: ${SKEYEVSS_MEDIA_SERVER_PORT}
    VssPort: ${SKEYEVSS_VSS_PORT}
    CronPort: ${SKEYEVSS_CRON_PORT}
    GuardPort: ${SKEYEVSS_GUARD_PORT}
    DBPort: ${SKEYEVSS_DB_GRPC_PORT}
    BackendApiPort: ${SKEYEVSS_BACKEND_API_PORT}
    MediaServerHttpsPort: ${SKEYEVSS_MEDIA_SERVER_HTTPS_PORT}
    MediaServerRtspPort: ${SKEYEVSS_MEDIA_SERVER_RTSP_PORT}
    MediaServerRtmpPort: ${SKEYEVSS_MEDIA_SERVER_RTMP_PORT}
    MediaRtcIceHostNatToIps: "${SKEYEVSS_MEDIA_RTC_ICE_HOST_NAT_TO_IPS}"

    EtcdHost: "${SKEYEVSS_ETCD_HOST}"

    ProxyApiBase: "${SKEYEVSS_WEB_SEV_PROXY_API_BACKEND}"
    ProxyApiExternal: "${SKEYEVSS_WEB_SEV_PROXY_API_EXTERNAL}"
    ProxyFile: "${SKEYEVSS_WEB_SEV_PROXY_FILE}"
    ProxyFileUrl: "${SKEYEVSS_WEB_SEV_PROXY_FILE_URL}"
    ProxyApiExternalTarget: "${SKEYEVSS_WEB_SEV_PROXY_API_EXTERNAL_TARGET}"

    MSNotifyOnPubStart: "${SKEYEVSS_MEDIA_SERVER_NOTIFY_ON_PUB_START}"
    MSNotifyOnPubStop: "${SKEYEVSS_MEDIA_SERVER_NOTIFY_ON_PUB_STOP}"
    MSNotifyOnPushStart: "${SKEYEVSS_MEDIA_SERVER_NOTIFY_ON_PUSH_START}"
    MSNotifyOnPushStop: "${SKEYEVSS_MEDIA_SERVER_NOTIFY_ON_PUSH_STOP}"
    MSNotifyOnRelayPullStart: "${SKEYEVSS_MEDIA_SERVER_NOTIFY_ON_RELAY_PULL_START}"
    MSNotifyOnRelayPullStop: "${SKEYEVSS_MEDIA_SERVER_NOTIFY_ON_RELAY_PULL_STOP}"
    MSNotifyOnRtmpConnect: "${SKEYEVSS_MEDIA_SERVER_NOTIFY_ON_RTMP_CONNECT}"
    MSNotifyOnSubStart: "${SKEYEVSS_MEDIA_SERVER_NOTIFY_ON_SUB_START}"

    SSL:
        PublicKey: "${SKEYEVSS_SSL_CERT_PUBLIC_KEY}"
        PrivateKey: "${SKEYEVSS_SSL_CERT_PRIVATE_KEY}"

    Keys:
        MediaServer: "${SKEYEVSS_U_KEY_MEDIA_SERVER}"
        Vss: "${SKEYEVSS_U_KEY_VSS}"
        Cron: "${SKEYEVSS_U_KEY_CRON}"
        DB: "${SKEYEVSS_U_KEY_DB}"
        BackendApi: "${SKEYEVSS_U_KEY_BACKEND_API}"
        WebSev: "${SKEYEVSS_U_KEY_WEB_SEV}"

# 资源信息
SevRes:
    EntranceDir: "${SKEYEVSS_SEV_RES_ENTRANCE_DIR}"
    AssetDir: "${SKEYEVSS_SEV_RES_ASSET_DIR}"
    RedisAsset: "${SKEYEVSS_SEV_RES_REDIS_ASSET}"
    MysqlAsset: "${SKEYEVSS_SEV_RES_MYSQL_ASSET}"
    EtcdAsset: "${SKEYEVSS_SEV_RES_ETCD_ASSET}"
    FfmpegAsset: "${SKEYEVSS_SEV_RES_FFMPEG_ASSET}"
    BackendWebAsset: "${SKEYEVSS_SEV_RES_BACKEND_WEB_ASSET}"
    AppSevAsset: "${SKEYEVSS_SEV_RES_APP_SEV_ASSET}"
    EtcAsset: "${SKEYEVSS_SEV_RES_ETC_ASSET}"

    BackendWebCodePath: "${SKEYEVSS_BACKEND_WEB_CODE_PATH}"
    MediaServerCodePath: "${SKEYEVSS_MEDIA_SERVER_CODE_PATH}"
    GoPath: "${SKEYEVSS_GOPATH}"

    AssetScriptsDir: "${SKEYEVSS_SEV_RES_ASSET_SCRIPTS_DIR}"
    # 数据目录
    AssetCertDir: "${SKEYEVSS_SEV_RES_ASSET_CERT_DIR}"
    AssetDataDir: "${SKEYEVSS_SEV_RES_ASSET_DATA_DIR}"
    AssetDatalog: "${SKEYEVSS_SEV_RES_ASSET_DATA_LOG}"
    MysqlData: "${SKEYEVSS_SEV_RES_MYSQL_DATA}"
    RedisData: "${SKEYEVSS_SEV_RES_REDIS_DATA}"
    EtcdData: "${SKEYEVSS_SEV_RES_ETCD_DATA}"
    ApiDocDir: "${SKEYEVSS_SEV_RES_API_DIR}"

    UseMysql: ${SKEYEVSS_ENABLED_MYSQL}
    UseRedis: ${SKEYEVSS_ENABLED_REDIS}
    UseFfmpeg: ${SKEYEVSS_ENABLED_FFMPEG}
    UseEtcd: ${SKEYEVSS_ENABLED_ETCD}
    # mysql sqlite
    DatabaseType: "${SKEYEVSS_DATABASE_TYPE}"

    # 存放依赖服务配置文件
    ConfigDir: "${SKEYEVSS_SEV_RES_CONFIG_DIR}"
    MysqlConfigPath: "${SKEYEVSS_SEV_RES_MYSQL_CONFIG_PATH}"
    RedisConfigPath: "${SKEYEVSS_SEV_RES_REDIS_CONFIG_PATH}"
    EtcdConfigPath: "${SKEYEVSS_SEV_RES_ETCD_CONFIG_PATH}"

    DBBaseName: "${SKEYEVSS_MYSQL_DB_NAME_BASE}"

Accounts:
    BackendUsername: "${SKEYEVSS_BACKEND_ADMIN_USERNAME}"
    BackendPassword: "${SKEYEVSS_BACKEND_ADMIN_PASSWORD}"
    BackendSuperUsername: "${SKEYEVSS_BACKEND_SUPER_USERNAME}"
    BackendSuperPassword: "${SKEYEVSS_BACKEND_SUPER_PASSWORD}"
    BackendShowcaseUsername: "${SKEYEVSS_BACKEND_SHOWCASE_USERNAME}"
    BackendShowcasePassword: "${SKEYEVSS_BACKEND_SHOWCASE_PASSWORD}"

ConfigPath:
    # 配置文件
    WebSevConf: "${SKEYEVSS_WEB_SEV_CONF}"
    MediaServerGrpcConf: "${SKEYEVSS_MEDIA_SERVER_CONF}"
    VssGrpcConf: "${SKEYEVSS_VSS_GRPC_CONF}"
    VssConf: "${SKEYEVSS_VSS_CONF}"
    CronConf: "${SKEYEVSS_CRON_CONF}"
    DbGrpcConf: "${SKEYEVSS_DB_GRPC_CONF}"
    BackendApiConf: "${SKEYEVSS_BACKEND_API_CONF}"
    GuardConf: "${SKEYEVSS_GUARD_CONF}"

GenUniqueId:
    Platform: "${SKEYEVSS_GEN_PLATFORM_UNIQUEID}"
    Dir: "${SKEYEVSS_GEN_DIR_UNIQUEID}"
    Nvr: "${SKEYEVSS_GEN_NVR_UNIQUEID}"
    Camera: "${SKEYEVSS_GEN_CAMERA_UNIQUEID}"